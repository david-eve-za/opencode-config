# SearXNG Configuration - Basic Setup
# Generated by setup-mcp script

general:
  debug: false
  instance_name: "SearXNG MCP"
  contact_url: false
  enable_metrics: false

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "changeme"
  limiter: false
  image_proxy: true

ui:
  static_use_hash: true
  default_theme: simple
  default_locale: ""
  center_alignment: false

search:
  safe_search: 1
  autocomplete: ""
  default_lang: "all"
  formats:
    - html
    - json
  categories:
    - general
  language_cookies_expire: 30

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    disabled: false
  - name: bing
    engine: bing
    shortcut: b
    disabled: false

redis:
  enabled: true
  host: valkey
  port: 6379

database:
  enabled: false