# SearXNG Configuration - Basic Setup
# Generated by setup-mcp script

general:
  debug: false
  instance_name: "SearXNG MCP"
  contact_url: false
  enable_metrics: false

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "changeme"
  limiter: false
  image_proxy: true

ui:
  static_use_hash: true
  default_theme: simple
  default_locale: ""
  center_alignment: false

search:
  safe_search: 1
  autocomplete: ""
  default_lang: "all"
  formats:
    - html
    - json
  categories:
    - general
  language_cookies_expire: 30
  doi_resolver: "https://doi.org/"

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    disabled: false
  - name: bing
    engine: bing
    shortcut: b
    disabled: false

redis:
  enabled: true
  host: valkey
  port: 6379

database:
  enabled: false

outgoing:
  request_timeout: 3.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true

preferences:
  lock: []
  #     - categories
  #     - language
  #     - autocomplete
  #     - favicon_resolver
  #     - safesearch
  #     - doi_resolver
  #     - locale
  #     - theme
  #     - results_on_new_tab
  #     - search_on_category_select
  #     - method
  #     - image_proxy
  #     - query_in_title

ui:
  static_use_hash: true
  default_theme: simple
  default_locale: ""
  center_alignment: false
  search_on_category_select: true
  hotkeys: default
  url_formatting: pretty